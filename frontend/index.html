<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentiment Analysis API</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      color: #e2e8f0;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #6366f1; }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 6px;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #334155; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 10px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .result.positive { background: #064e3b; border: 1px solid #059669; }
    .result.negative { background: #450a0a; border: 1px solid #dc2626; }
    .result.error    { background: #1c1917; border: 1px solid #ea580c; }

    .sentiment-label {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .confidence {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .meta {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #64748b;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Sentiment Analysis</h1>
    <p class="subtitle">Powered by DistilBERT + FastAPI</p>

    <textarea id="textInput" placeholder="Type something... e.g. 'I absolutely love this product!'" maxlength="5000"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 5000</div>

    <button id="analyzeBtn" onclick="analyze()">Analyze Sentiment</button>

    <div class="result" id="result">
      <div class="sentiment-label" id="sentimentLabel"></div>
      <div class="confidence" id="confidenceText"></div>
      <div class="meta" id="metaText"></div>
    </div>
  </div>

  <script>
    // ⚠️ Replace this URL after deploying to HuggingFace Spaces
    const API_URL = "http://localhost:8000";

    const textInput = document.getElementById("textInput");
    const charCount = document.getElementById("charCount");

    textInput.addEventListener("input", () => {
      charCount.textContent = textInput.value.length;
    });

    async function analyze() {
      const text = textInput.value.trim();

      if (!text) {
        showError("Please enter some text first.");
        return;
      }

      const btn = document.getElementById("analyzeBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';

      try {
        const response = await fetch(`${API_URL}/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || `HTTP ${response.status}`);
        }

        const data = await response.json();
        showResult(data);

      } catch (error) {
        showError(error.message || "Could not connect to API. Is the backend running?");
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze Sentiment";
      }
    }

    function showResult(data) {
      const resultDiv = document.getElementById("result");
      const isPositive = data.sentiment === "POSITIVE";

      resultDiv.className = `result ${isPositive ? "positive" : "negative"}`;
      resultDiv.style.display = "block";

      document.getElementById("sentimentLabel").textContent =
        isPositive ? "✅ POSITIVE" : "❌ NEGATIVE";

      document.getElementById("confidenceText").textContent =
        `Confidence: ${(data.confidence * 100).toFixed(2)}%`;

      document.getElementById("metaText").textContent =
        `Processed in ${data.processing_time_ms}ms`;
    }

    function showError(message) {
      const resultDiv = document.getElementById("result");
      resultDiv.className = "result error";
      resultDiv.style.display = "block";
      document.getElementById("sentimentLabel").textContent = "⚠️ Error";
      document.getElementById("confidenceText").textContent = message;
      document.getElementById("metaText").textContent = "";
    }

    // Allow Enter key (Ctrl+Enter) to submit
    textInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.ctrlKey) analyze();
    });
  </script>
</body>
</html>
